name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Backend - compile
        run: cd backend && bun run compile

      - name: Backend - unit tests
        run: cd backend && bun run test

      - name: Frontend - compile
        run: cd frontend && bun run compile

      # Installs the pinned kwokctl into the repo's bin/, which the smoke, e2e, and
      # fixture scripts put on PATH themselves. Same script developers run locally, so
      # CI and local machines run the identical kwokctl.
      - name: Install prerequisites (kwokctl)
        run: bash scripts/install-prereqs.sh

      - name: Smoke tests
        run: bash scripts/smoke-tests.sh

      - name: Install Playwright browser and system dependencies
        run: cd e2e && bunx playwright install --with-deps chromium

      - name: E2E tests
        run: bash scripts/e2e-tests.sh
